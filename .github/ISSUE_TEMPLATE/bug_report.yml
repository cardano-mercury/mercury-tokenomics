name: Bug report
description: Something behaves incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security problems here. Follow [SECURITY.md](../blob/main/SECURITY.md) instead.

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you saw, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a project with ...
        2. Add a bucket with a 6 month cliff
        3. Open the statement
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The version from package.json, or the commit.
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Cardano network
      options: [preprod, preview, mainnet, not applicable]
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, a transaction hash. Redact secrets and connection strings.
